name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills-consistency:
    name: validate-skills-consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate skills
        shell: pwsh
        run: ./scripts/install-skills.ps1 -SkipInstall -Validate full

      - name: Smoke-test PR readiness helper script
        run: python scripts/validation/github-validate-pr-readiness-contract.py --help
