name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills:
    name: validate-skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install local helper package
        run: python -m pip install .

      - name: Validate skills
        run: python scripts/validate-skills.py

      - name: Smoke-test GH helper package
        run: python -m ceratops_gh_current_state --help
